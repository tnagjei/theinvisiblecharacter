# input: Pull requests, pushes to main, and manual workflow runs
# output: Verified build, SEO, link, and security-header checks
# pos: .github/workflows/deploy.yml（更新规则：变更时同步文件头与所属目录 README）

name: Validate Site

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PUPPETEER_SKIP_DOWNLOAD: 'true'
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

jobs:
  checks:
    name: Run Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies without browser downloads
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check SEO
        run: npm run check:seo

      - name: Check internal links
        run: npm run check:links

      - name: Check security headers
        run: npm run check:headers
